services:
  - type: web
    name: kirinyaga-gala-backend
    env: node
    plan: free
    buildCommand: |
      apt-get update && apt-get install -y python3 make g++ \
      && npm install
    startCommand: node server.js
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        value: 11makus72
      - key: VOTE_PRICE
        value: 10
      - key: COUNTDOWN_DAYS
        value: 20
      - key: MPESA_MODE
        value: sandbox
      - key: MPESA_CONSUMER_KEY
        value: k232eutaV7AgV8jgFGJkKghNFeMlwZp2Bfq9Q1GFwRF0puc9
      - key: MPESA_CONSUMER_SECRET
        value: k232eutaV7AgV8jgFGJkKghNFeMlwZp2Bfq9Q1GFwRF0puc9
      - key: MPESA_SHORTCODE
        value: "174379"
      - key: MPESA_PASSKEY
        value: bfb279f9aa9bdbcf158e97dd71a467cd2e0c893059b10f78e6b72ada1ed2c91
      - key: CORS_ORIGINS
        value: "*"
      - key: DB_PATH
        value: /var/data/gala.db
    disk:
      name: gala-data
      mountPath: /var/data
      sizeGB: 1